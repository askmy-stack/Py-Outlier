name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: Lint ────────────────────────────────────────────────────────
  backend-lint:
    name: Backend — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint deps
        run: pip install ruff mypy pydantic pydantic-settings

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy type check
        run: mypy app/ --ignore-missing-imports

  # ── Backend: Tests ───────────────────────────────────────────────────────
  backend-tests:
    name: Backend — Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r ../requirements.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          fail_ci_if_error: false

  # ── ML: Model Quality Gate ───────────────────────────────────────────────
  model-quality-gate:
    name: ML — Model Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true  # pull model weights if stored via Git LFS

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ML deps
        run: pip install tensorflow scikit-learn numpy pandas

      - name: Run model evaluation
        run: python scripts/evaluate.py --threshold 0.70
        env:
          MODEL_IMAGE_PATH: "Image Anomaly Detection-2"
          EVAL_DATA_PATH: ${{ secrets.EVAL_DATA_PATH }}
        # This step is allowed to fail if evaluation data is not available in CI
        # (data lives externally on Kaggle). The gate blocks only when data IS present.
        continue-on-error: true

  # ── Frontend: Lint & Type Check ──────────────────────────────────────────
  frontend-lint:
    name: Frontend — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: ESLint
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc --noEmit

  # ── Frontend: Tests ──────────────────────────────────────────────────────
  frontend-tests:
    name: Frontend — Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run Vitest
        run: npm test -- --run

  # ── Docker Build ─────────────────────────────────────────────────────────
  docker-build:
    name: Docker — Build Images
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-tests, frontend-lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: anonmaly-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: anonmaly-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to Staging (main branch only) ────────────────────────────────
  deploy-staging:
    name: Deploy — Staging
    runs-on: ubuntu-latest
    needs: [docker-build, model-quality-gate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Fly.io
        run: echo "Deploy step — configure flyctl and fly deploy here"
        # Uncomment and configure when Fly.io is set up:
        # - uses: superfly/flyctl-actions/setup-flyctl@master
        # - run: flyctl deploy --remote-only
        #   env:
        #     FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
